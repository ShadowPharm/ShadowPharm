    <style>
        body {

        }
        .container {
            max-width: 1200px;
            margin: 0 auto;

        header {

            font-size: 1.5rem;
            color: #9c27b0;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;

            height: 20px;

            font-size: 0.8rem;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .product {
            background-color: #2a2a2a;
            border-radius: 8px;

        button:hover {

        .modal {

            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: #2a2a2a;
            margin: 2% auto;
            padding: 20px;
            border: 1px solid #333;
            width: 90%;
            max-width: 800px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: white;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-price {
            font-weight: bold;
            color: #4caf50;
        }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
        .cart-item-quantity button {
            background-color: #333;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 4px;

            font-size: 0.8rem;

        }
        .cart-item-quantity span {
            margin: 0 10px;
        }
        .cart-total {
            text-align: right;

            font-weight: bold;
        }
        .checkout-button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2rem;
            width: 100%;

        .checkout-button:hover {

        }
        .payment-info {
            margin: 20px 0;

        .nav-links {

            margin: 0 15px;
            text-decoration: none;

        .empty-cart {

        }
        .header-left {
            display: flex;
            flex-direction: column;
        }
        .header-right {
            display: flex;
            align-items: center;
        }
